name: Bug report
description: Report a bug or issue with the Apify MCP server
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: server-type
    attributes:
      label: Server type
      description: Are you using the hosted server or running it locally?
      options:
        - "Local (stdio via npx @apify/actors-mcp-server)"
        - "Hosted (mcp.apify.com)"
    validations:
      required: true

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Claude Desktop
        - Claude.ai (web)
        - Claude Code (CLI)
        - VS Code
        - Cursor
        - ChatGPT
        - Other (specify in description)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you do, what went wrong, and what did you expect instead?
      placeholder: "Describe the issue..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Claude Desktop
        2. Start a new conversation
        3. Try to use an Apify tool
        4. See error...
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: "Run `node --version`. Required v22+."
      placeholder: "e.g., v22.5.0"
    validations:
      required: false

  - type: input
    id: server-version
    attributes:
      label: Apify MCP Server version
      description: "Run `npx @apify/actors-mcp-server --version` or check your package.json"
      placeholder: "e.g., 2.5.0"
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: MCP server configuration
      description: |
        **For Claude Desktop**: paste your `claude_desktop_config.json` (Settings > Developer).
        **For hosted server**: paste the full URL (e.g., `https://mcp.apify.com?tools=actors`).

        **Remove your APIFY_TOKEN before pasting!**
      render: json
      placeholder: |
        {
          "mcpServers": {
            "apify": {
              "command": "npx",
              "args": ["-y", "@apify/actors-mcp-server"],
              "env": {
                "APIFY_TOKEN": "<REMOVED>"
              }
            }
          }
        }
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: |
        Paste any error messages or logs.

        **Claude Desktop MCP logs:**
        - **macOS**: `~/Library/Logs/Claude/mcp*.log`
        - **Windows**: `%APPDATA%\Claude\logs\mcp*.log`
      render: text
    validations:
      required: false
